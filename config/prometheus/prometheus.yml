global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: deepnovel

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ai-engine'
    static_configs:
      - targets: ['ai-engine:8000']
    metrics_path: /metrics
    scrape_interval: 10s
