# ============================================================
# docker-compose.yml 閳?DeepNovel 閺堝秴濮熺紓鏍ㄥ笓
# 閺€顖涘瘮 Profile 閸掑棗鐪伴崥顖氬З:
#   docker compose up -d                    # 娴犲懎鐔€绾偓鐠佺偓鏌?
#   docker compose --profile app up -d      # 閸╄櫣顢呯拋鐐煢 + 鎼存梻鏁?
#   docker compose --profile dev up -d      # 閸氼偄绱戦崣鎴濅紣閸?
#   docker compose --profile monitoring up -d  # 閸氼偆娲冮幒褎鐖?
# ============================================================

name: ai_novels

x-common-security: &common-security
  security_opt:
    - no-new-privileges:true

x-common-logging: &common-logging
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "5"
      tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

x-common-restart: &common-restart
  restart: unless-stopped

services:
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  # 鎼存梻鏁ょ仦?
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

  ai-engine:
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: Dockerfile.ai
      target: production
      args:
        - APP_UID=1000
        - APP_GID=1000
    image: ai-novels-ai:latest
    container_name: ai-novels-ai
    <<: [*common-security, *common-logging, *common-restart]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      - APP_ENV=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - config/.env
    ports:
      - "33100:8000"
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_started
      mongodb:
        condition: service_started
      chromadb:
        condition: service_started
    networks:
      - ai_novels
    profiles:
      - app
      - full
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  # 閻滅増婀侀弫鐗堝祦鐏?(Step1鏉╀胶些閸撳秳绻氶悾?
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

  mysql:
    image: mysql:8.0.40
    container_name: ai-novels-mysql
    <<: [*common-security, *common-logging, *common-restart]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ai_novels_root}
      MYSQL_DATABASE: ai_novels
      MYSQL_USER: ${MYSQL_USER:-ai_novels}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_novels_pass}
    ports:
      - "33306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/init/mysql_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ai_novels_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  neo4j:
    image: neo4j:5.23.0-community
    container_name: ai-novels-neo4j
    <<: [*common-security, *common-logging, *common-restart]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ai_novels_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_default__listen__address: 0.0.0.0
    ports:
      - "33474:7474"
      - "33687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p '${NEO4J_PASSWORD:-ai_novels_neo4j}' 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  mongodb:
    image: mongo:7.0.14
    container_name: ai-novels-mongodb
    <<: [*common-security, *common-logging, *common-restart]
    environment:
      MONGO_INITDB_DATABASE: ai_novels
    ports:
      - "33217:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/init/mongodb_init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping: 1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: ai-novels-chromadb
    <<: [*common-security, *common-logging, *common-restart]
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: /chroma
      ALLOW_RESET: "true"
    ports:
      - "33801:8000"
    volumes:
      - chromadb_data:/chroma
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as r, sys; sys.exit(0 if r.urlopen(\"http://localhost:8000/api/v1/heartbeat\").status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  # 閺傜増鏆熼幑顔肩湴 (Step1鏉╀胶些閻╊喗鐖?
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

  postgres:
    image: postgres:16.4-alpine
    container_name: ai-novels-postgres
    <<: [*common-security, *common-logging, *common-restart]
    environment:
      POSTGRES_DB: ai_novels
      POSTGRES_USER: ${DB_USER:-ai_novels}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_novels_pass}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "33432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_novels}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7.4-alpine
    container_name: ai-novels-redis
    <<: [*common-security, *common-logging, *common-restart]
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-ai_novels_redis}
    ports:
      - "33379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: ai-novels-qdrant
    <<: [*common-security, *common-logging, *common-restart]
    ports:
      - "33333:6333"
      - "33334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_novels
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  # 瀵偓閸欐垵浼愰崗宄扮湴 (profile: dev)
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

  adminer:
    image: adminer:4.8.1
    container_name: ai-novels-adminer
    <<: [*common-logging, *common-restart]
    profiles:
      - dev
      - full
    ports:
      - "33081:8080"
    networks:
      - ai_novels

  redis-insight:
    image: redis/redisinsight:2.48.0
    container_name: ai-novels-redis-insight
    <<: [*common-logging, *common-restart]
    profiles:
      - dev
      - full
    ports:
      - "33540:5540"
    networks:
      - ai_novels

  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
  # 閻╂垶甯剁仦?(profile: monitoring)
  # 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ai-novels-prometheus
    <<: [*common-security, *common-logging, *common-restart]
    profiles:
      - monitoring
      - full
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "33990:9090"
    networks:
      - ai_novels

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ai-novels-grafana
    <<: [*common-security, *common-logging, *common-restart]
    profiles:
      - monitoring
      - full
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "33301:3000"
    networks:
      - ai_novels

# 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓
# 缂冩垹绮舵稉搴″祹
# 閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓閳光偓

networks:
  ai_novels:
    name: ai_novels
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data:
    driver: local
  neo4j_data:
    driver: local
  mongodb_data:
    driver: local
  chromadb_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
